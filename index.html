<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>職場RPGジョブ診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --card:      #1a1a2e;
      --border:    #8b6914;
      --gold:      #ffd700;
      --parchment: #e8d5a3;
      --dim:       #a09060;
      --orange:    #ff9933;
      --blue:      #3399ff;
      --green:     #33aa55;
      --red:       #cc4444;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--parchment);
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 20px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(30,10,60,.35) 0%, transparent 65%),
        radial-gradient(ellipse at 80% 15%, rgba(10,30,60,.3) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 16px 80px;
      position: relative;
      z-index: 1;
    }

    /* ── RPG card ── */
    .rpg-card {
      background: var(--card);
      border: 2px solid var(--border);
      box-shadow: 0 0 0 1px #000, 0 0 0 3px var(--border), 0 0 0 4px #000;
      position: relative;
      padding: 24px;
      margin-bottom: 20px;
    }
    .rpg-card::before {
      content: '';
      position: absolute; inset: 5px;
      border: 1px solid rgba(139,105,20,.22);
      pointer-events: none;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 28px; }
    .eyebrow {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--dim);
      letter-spacing: .15em;
      margin-bottom: 12px;
    }
    .site-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(15px, 3.8vw, 22px);
      color: var(--gold);
      text-shadow: 0 0 18px rgba(255,215,0,.5), 0 0 36px rgba(255,215,0,.2);
      line-height: 1.8;
    }
    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--border), var(--gold), var(--border), transparent);
      margin: 14px 0;
    }
    .subtitle { font-size: 18px; color: var(--dim); }

    /* ── Progress ── */
    .progress-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .progress-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--dim);
      min-width: 40px;
    }
    .progress-dots { display: flex; gap: 6px; }
    .pdot {
      width: 10px; height: 10px;
      background: rgba(139,105,20,.3);
      border: 1px solid rgba(139,105,20,.5);
    }
    .pdot.done { background: var(--gold); border-color: var(--gold); }
    .pdot.active { background: transparent; border-color: var(--gold); animation: pdot-pulse .8s ease-in-out infinite alternate; }
    @keyframes pdot-pulse { to { background: rgba(255,215,0,.4); } }

    /* ── Quiz card ── */
    #quiz-section { }
    .question-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .1em;
      margin-bottom: 10px;
    }
    .question-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.5vw, 13px);
      color: var(--gold);
      line-height: 1.9;
      margin-bottom: 22px;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(10,10,20,.7);
      border: 1px solid rgba(139,105,20,.45);
      box-shadow: 0 0 0 1px #000;
      color: var(--parchment);
      font-family: 'VT323', monospace;
      font-size: 20px;
      padding: 13px 16px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: all .15s;
      line-height: 1.4;
    }
    .option-btn:hover {
      background: rgba(30,20,10,.9);
      border-color: var(--gold);
      box-shadow: 0 0 0 1px #000, 0 0 10px rgba(255,215,0,.15);
      color: var(--gold);
    }
    .option-btn.selected {
      background: rgba(60,45,0,.9);
      border-color: var(--gold);
      box-shadow: 0 0 0 1px #000, 0 0 16px rgba(255,215,0,.3);
      color: var(--gold);
    }
    .option-btn:disabled { opacity: .4; cursor: not-allowed; }

    .opt-key {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--gold);
      background: rgba(139,105,20,.25);
      border: 1px solid rgba(139,105,20,.6);
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .opt-text { flex: 1; }

    /* ── Fade animation ── */
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }
    .fade-in  { animation: fadeIn  .35s ease both; }
    .fade-out { animation: fadeOut .25s ease both; }

    /* ── Loading ── */
    #loading-section {
      display: none;
      text-align: center;
      padding: 48px 0;
    }
    .loading-msg {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--gold);
      margin-bottom: 24px;
    }
    .px-dots { display: flex; gap: 10px; justify-content: center; }
    .px-dot  {
      width: 14px; height: 14px; background: var(--gold);
      animation: px-blink 1s step-end infinite;
    }
    .px-dot:nth-child(1) { animation-delay: 0s; }
    .px-dot:nth-child(2) { animation-delay: .18s; }
    .px-dot:nth-child(3) { animation-delay: .36s; }
    .px-dot:nth-child(4) { animation-delay: .54s; }
    .px-dot:nth-child(5) { animation-delay: .72s; }
    @keyframes px-blink { 0%,100% { opacity: 1; } 50% { opacity: .1; } }

    /* ── Result ── */
    #result-section { display: none; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    .result-anim { animation: slideUp .5s ease both; }

    .job-hero { text-align: center; padding: 16px 0 14px; }
    .job-hero-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--dim);
      letter-spacing: .14em;
      margin-bottom: 12px;
    }
    .job-name {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(17px, 4.5vw, 26px);
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,.55), 0 0 40px rgba(255,215,0,.25);
      line-height: 1.5;
    }

    .row { margin-bottom: 18px; }
    .row-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: .07em;
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 7px;
    }
    .row-text { font-size: 20px; line-height: 1.65; color: var(--parchment); padding-left: 12px; }
    .row-text.bl { border-left: 2px solid; padding-left: 12px; }
    .c-str  { color: var(--orange); }
    .c-wk   { color: var(--red);    }
    .c-role { color: var(--blue);   }
    .c-com  { color: var(--green);  }
    .c-w1   { color: #ffcc00; }
    .c-w2   { color: #ff9933; }

    hr.thin { border: none; border-top: 1px solid rgba(139,105,20,.28); margin: 14px 0; }

    .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    @media (max-width: 460px) { .sub-grid { grid-template-columns: 1fr; } }
    .sub-card {
      background: var(--card);
      border: 1px solid rgba(139,105,20,.45);
      box-shadow: 0 0 0 1px #000, 0 0 0 2px rgba(139,105,20,.3);
      padding: 15px; opacity: .87;
    }
    .sub-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--dim);
      margin-bottom: 8px; line-height: 1.8;
    }
    .sub-reason { font-size: 18px; line-height: 1.6; color: var(--parchment); opacity: .9; }

    /* Copy / retry */
    .action-row { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
    .action-hint { font-size: 17px; color: var(--dim); }
    #copy-ok { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--green); min-height: 1.4em; }
    .retry-row { text-align: center; margin-top: 10px; }

    /* Buttons */
    .rpg-btn {
      display: inline-block;
      background: linear-gradient(180deg, #3a2a00 0%, #1a1200 100%);
      border: 2px solid var(--border);
      box-shadow: 0 0 0 1px #000, 0 0 0 3px var(--border), 0 0 0 4px #000,
                  inset 0 1px 0 rgba(255,215,0,.18);
      color: var(--gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 13px 24px;
      cursor: pointer;
      letter-spacing: .03em;
      transition: all .1s;
    }
    .rpg-btn:hover {
      background: linear-gradient(180deg, #5a4200 0%, #2a2000 100%);
      box-shadow: 0 0 0 1px #000, 0 0 0 3px #ffd700, 0 0 0 4px #000,
                  inset 0 1px 0 rgba(255,215,0,.35), 0 0 14px rgba(255,215,0,.18);
    }
    .rpg-btn:active { transform: translateY(1px); }
    .rpg-btn.small { font-size: 9px; padding: 10px 18px; }

    /* Section label */
    .slabel {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--gold);
      letter-spacing: .1em; margin-bottom: 8px;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="eyebrow">✦ WORKPLACE RPG ✦</div>
    <h1 class="site-title">職場RPG<br>ジョブ診断</h1>
    <div class="divider" style="margin-top:16px;"></div>
    <p class="subtitle">6つの質問に答えてジョブを判定します</p>
  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progress-bar">
    <span class="progress-label" id="progress-label">Q1 / 6</span>
    <div class="progress-dots" id="progress-dots"></div>
  </div>

  <!-- Quiz -->
  <div id="quiz-section">
    <div class="rpg-card fade-in" id="question-card">
      <div class="question-num" id="q-num">QUESTION 1 / 6</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-section">
    <div class="loading-msg" id="loading-msg">ジョブ適性を判定中...<span style="animation:px-blink 1s step-end infinite;display:inline-block;">█</span></div>
    <div class="px-dots">
      <div class="px-dot"></div>
      <div class="px-dot"></div>
      <div class="px-dot"></div>
      <div class="px-dot"></div>
      <div class="px-dot"></div>
    </div>
  </div>

  <!-- Result -->
  <div id="result-section">

    <!-- Main job -->
    <div class="rpg-card result-anim" id="main-card">
      <div class="job-hero">
        <div class="job-hero-label">✦ YOUR JOB ✦</div>
        <div class="job-name" id="r-name">—</div>
      </div>
      <div class="divider"></div>

      <div class="row">
        <div class="row-label c-str"><span>⚔</span> 得意なこと</div>
        <div class="row-text" id="r-str"></div>
      </div>
      <hr class="thin">
      <div class="row">
        <div class="row-label c-wk"><span>💀</span> 苦手なこと</div>
        <div class="row-text" id="r-wk"></div>
      </div>
      <hr class="thin">
      <div class="row">
        <div class="row-label c-role"><span>🛡</span> チームでの役割</div>
        <div class="row-text" id="r-role"></div>
      </div>
      <hr class="thin">
      <div class="row">
        <div class="row-label c-com"><span>♥</span> 相性のいいジョブ</div>
        <div class="row-text" id="r-com"></div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <div class="row-label c-w1">⚠ このジョブが多いチームの注意点</div>
        <div class="row-text bl c-w1" id="r-w1" style="border-color:#ffcc00;"></div>
      </div>
      <div class="row" style="margin-bottom:0;">
        <div class="row-label c-w2">⚠ このジョブがいないチームの注意点</div>
        <div class="row-text bl c-w2" id="r-w2" style="border-color:#ff9933;"></div>
      </div>
    </div>

    <!-- Sub jobs -->
    <div style="margin-bottom:8px;">
      <div class="slabel" style="text-align:center; letter-spacing:.14em;">◆ 転職候補ジョブ ◆</div>
      <div class="sub-grid" id="sub-grid"></div>
    </div>

    <!-- Copy -->
    <div class="rpg-card result-anim">
      <div class="action-row">
        <div class="slabel" style="margin-bottom:0;">✦ SHARE ✦</div>
        <p class="action-hint">診断結果をテキストでコピーできます</p>
        <button class="rpg-btn small" id="copy-btn">📋 結果テキストをコピー</button>
        <div id="copy-ok"></div>
      </div>
    </div>

    <!-- Retry -->
    <div class="retry-row">
      <button class="rpg-btn" id="retry-btn">もう一度診断する</button>
    </div>

  </div>

</div><!-- /wrap -->

// ==========================================
// QUESTIONS
// ==========================================
const QUESTIONS = [
  {

  {

      { key: 'A', text: 'アイデアや熱量を出す側' },

      { key: 'D', text: '専門知識' },
    ]
  },
];

// ==========================================
// SCORING MATRIX
// ==========================================
const SCORING = {
  1: {
    A: { '勇者': 3, '武闘家': 2, '遊び人': 1 },
    B: { '賢者': 3, 'ルーラー': 2, '商人': 1 },
    C: { '僧侶': 3, '踊り子': 2, '盗賊': 1 },
    D: { '魔法使い': 3, '召喚士': 2, 'ニンジャ': 1 },
  },
  2: {
    A: { '武闘家': 3, 'ニンジャ': 2, 'ネクロマンサー': 1 },
    B: { '戦士': 3, '賢者': 2, '商人': 1 },
    C: { '僧侶': 3, '勇者': 2, '踊り子': 1 },
    D: { 'ネクロマンサー': 3, '戦士': 2, '遊び人': 1 },
  },
  3: {
    A: { '遊び人': 3, '勇者': 2, '踊り子': 2 },
    B: { '商人': 3, '賢者': 2, 'ルーラー': 1 },
    C: { '盗賊': 3, '僧侶': 2, '召喚士': 1 },
    D: { 'ニンジャ': 3, '戦士': 2, '武闘家': 1 },
  },
  4: {
    A: { '勇者': 3, '遊び人': 3 },
    B: { '賢者': 2, 'ルーラー': 2, '召喚士': 2 },
    C: { '僧侶': 3, '踊り子': 2 },
    D: { 'ニンジャ': 3, '魔法使い': 2 },
  },
  5: {
    A: { '戦士': 3, '勇者': 2, 'ネクロマンサー': 2 },
    B: { 'ルーラー': 3, '僧侶': 2, '賢者': 1 },
    C: { '商人': 3, '賢者': 2 },
    D: { '盗賊': 3, 'ニンジャ': 2, '魔法使い': 1, '遊び人': 1 },
  },
  6: {
    A: { '武闘家': 3, '勇者': 2, 'ネクロマンサー': 2 },
    B: { 'ルーラー': 3, '賢者': 2, '戦士': 1 },
    C: { '僧侶': 3, '盗賊': 2, '踊り子': 2 },
    D: { '召喚士': 3, '魔法使い': 2, 'ニンジャ': 1 },
  },
};

// ==========================================
// STATE
// ==========================================
let currentQ  = 1;
let answers   = {};
let resultData = null;

// ==========================================
// INIT
// ==========================================
buildProgressDots();
renderQuestion(1);

// ==========================================
// PROGRESS DOTS
// ==========================================
function buildProgressDots() {
  const el = document.getElementById('progress-dots');
  el.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i === 1 ? ' active' : '');
    d.id = 'pdot-' + i;
    el.appendChild(d);
  }
}

function updateProgress(qNum) {
  document.getElementById('progress-label').textContent = 'Q' + qNum + ' / 6';
  for (let i = 1; i <= 6; i++) {
    const d = document.getElementById('pdot-' + i);
    d.className = 'pdot' + (i < qNum ? ' done' : i === qNum ? ' active' : '');
  }
}

// ==========================================
// RENDER QUESTION
// ==========================================
function renderQuestion(qNum) {
  const q   = QUESTIONS[qNum - 1];
  const card = document.getElementById('question-card');

  document.getElementById('q-num').textContent  = 'QUESTION ' + qNum + ' / 6';
  document.getElementById('q-text').textContent  = q.text;

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML =
      '<span class="opt-key">' + opt.key + '</span>' +
      '<span class="opt-text">' + opt.text + '</span>';
    btn.addEventListener('click', () => onSelectAnswer(qNum, opt.key, btn));
    opts.appendChild(btn);
  });

  card.classList.remove('fade-out');
  card.classList.add('fade-in');
  updateProgress(qNum);
}

// ==========================================
// SELECT ANSWER
// ==========================================
function onSelectAnswer(qNum, key, btn) {
  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');

  answers[qNum] = key;

  setTimeout(() => {
    if (qNum < 6) {
      const card = document.getElementById('question-card');
      card.classList.remove('fade-in');
      card.classList.add('fade-out');
      setTimeout(() => {
        currentQ = qNum + 1;
        renderQuestion(currentQ);
      }, 260);
    } else {
      // Final answer
      showLoading();
    }
  }, 400);
}

// ==========================================
// LOADING → RESULT
// ==========================================
const LOADING_MSGS = [
  '冒険者ギルドに問い合わせ中...',
  'ジョブ適性を判定中...',
  '運命の書を解読中...',
];

function showLoading() {
  document.getElementById('quiz-section').style.display  = 'none';
  document.getElementById('progress-bar').style.display  = 'none';
  document.getElementById('loading-section').style.display = 'block';

  let idx = 0;
  const msgEl = document.getElementById('loading-msg');
  const interval = setInterval(() => {
    idx = (idx + 1) % LOADING_MSGS.length;
    msgEl.innerHTML = LOADING_MSGS[idx] + '<span style="animation:px-blink 1s step-end infinite;display:inline-block;">█</span>';
  }, 900);

  setTimeout(() => {
    clearInterval(interval);
    document.getElementById('loading-section').style.display = 'none';
    showResult(calcResult());
  }, 1800);
}

// ==========================================
// CALCULATE RESULT
// ==========================================
function calcResult() {
  const scores = {};
  for (let q = 1; q <= 6; q++) {
    const key = answers[q];
    if (!key) continue;
    const pts = SCORING[q][key] || {};
    for (const [job, pt] of Object.entries(pts)) {
      scores[job] = (scores[job] || 0) + pt;
    }
  }
  // Sort descending
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return {
    main: sorted[0]?.[0] || '勇者',
    sub1: sorted[1]?.[0] || '賢者',
    sub2: sorted[2]?.[0] || '戦士',
  };
}

// ==========================================
// SHOW RESULT
// ==========================================
function showResult({ main, sub1, sub2 }) {
  resultData = { main, sub1, sub2 };

  const mj = JOBS[main];
  document.getElementById('r-name').textContent = '【 ' + main + ' 】';
  document.getElementById('r-str').textContent  = mj.strength;
  document.getElementById('r-wk').textContent   = mj.weakness;
  document.getElementById('r-role').textContent = mj.role;
  document.getElementById('r-com').textContent  = mj.compat;
  document.getElementById('r-w1').textContent   = mj.warnMany;
  document.getElementById('r-w2').textContent   = mj.warnFew;

  const grid = document.getElementById('sub-grid');
  grid.innerHTML = '';
  [sub1, sub2].forEach((jobName, i) => {
    const j = JOBS[jobName];
    const card = document.createElement('div');
    card.className = 'sub-card result-anim';
    card.style.animationDelay = (0.15 * (i + 1)) + 's';
    card.innerHTML =
      '<div class="sub-name">No.' + (i + 1) + ' &mdash; ' + esc(jobName) + '</div>' +
      '<div class="sub-reason">' + esc(j.trait) + 'な側面があなたに重なっています</div>';
    grid.appendChild(card);
  });

  document.getElementById('result-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==========================================
// COPY
// ==========================================
document.getElementById('copy-btn').addEventListener('click', () => {
  if (!resultData) return;
  const mj = JOBS[resultData.main];
  const lines = [
    '【職場RPGジョブ診断】',
    '',
    'あなたのジョブ：' + resultData.main,
    '',
    '⚔ 得意なこと',
    mj.strength,
    '',
    '💀 苦手なこと',
    mj.weakness,
    '',
    '🛡 チームでの役割',
    mj.role,
    '',
    '♥ 相性のいいジョブ',
    mj.compat,
    '',
    '⚠ このジョブが多いチームの注意点',
    mj.warnMany,
    '',
    '⚠ このジョブがいないチームの注意点',
    mj.warnFew,
    '',
    '◆ 転職候補',
    'No.1 ' + resultData.sub1 + '：' + JOBS[resultData.sub1].trait + 'な側面があなたに重なっています',
    'No.2 ' + resultData.sub2 + '：' + JOBS[resultData.sub2].trait + 'な側面があなたに重なっています',
  ];
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(copiedOK).catch(() => {
    const el = document.createElement('textarea');
    el.value = text;
    el.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    copiedOK();
  });
});

function copiedOK() {
  const el = document.getElementById('copy-ok');
  el.textContent = '✓ コピーしました！';
  setTimeout(() => { el.textContent = ''; }, 2500);
}

// ==========================================
// RETRY
// ==========================================
document.getElementById('retry-btn').addEventListener('click', () => {
  answers = {};
  currentQ = 1;
  resultData = null;

  document.getElementById('result-section').style.display = 'none';
  document.getElementById('progress-bar').style.display   = 'flex';
  document.getElementById('quiz-section').style.display   = 'block';

  buildProgressDots();
  renderQuestion(1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ==========================================
// HELPERS
// ==========================================
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
